AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Claro y Simple — Infraestructura serverless.
  Módulo 1: Ingesta y extracción de texto desde PDFs.
  Módulo 2: Motor de análisis de contratos con Amazon Bedrock.

# ---------------------------------------------------------------------------
# Parámetros
# ---------------------------------------------------------------------------

Parameters:
  EnvironmentName:
    Type: String
    Default: development
    AllowedValues:
      - localstack
      - development
      - production
    Description: >
      Modo del entorno. 'localstack' usa endpoints emulados localmente;
      'development' y 'production' apuntan a AWS real.

# ---------------------------------------------------------------------------
# Mappings
# ---------------------------------------------------------------------------

Mappings:
  EnvironmentBucketSuffix:
    localstack:
      Suffix: localstack
    development:
      Suffix: dev
    production:
      Suffix: production

# ---------------------------------------------------------------------------
# Recursos
# ---------------------------------------------------------------------------

Resources:

  # -------------------------------------------------------------------------
  # API Gateway — REST API
  # -------------------------------------------------------------------------

  ClaroYSimpleApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref EnvironmentName
      Description: API de Claro y Simple
      Tags:
        project: hackaton
      # API Key requerida para control de costos durante el hackathon
      Auth:
        ApiKeyRequired: true
      # Throttling: rate 10 req/s, burst 20 (tech.md)
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 10
          ThrottlingBurstLimit: 20

  # -------------------------------------------------------------------------
  # Bucket S3 — almacenamiento de PDFs subidos
  # -------------------------------------------------------------------------

  ContractsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub
        - "claro-y-simple-contracts-${Suffix}"
        - Suffix: !FindInMap [EnvironmentBucketSuffix, !Ref EnvironmentName, Suffix]
      LifecycleConfiguration:
        Rules:
          - Id: expire-contracts-24h
            Status: Enabled
            Filter:
              Prefix: contracts/
            Expiration:
              Days: 1
      # Eliminar objetos completamente después de 24h
      VersioningConfiguration:
        Status: Disabled
      Tags:
        - Key: project
          Value: hackaton

  # -------------------------------------------------------------------------
  # Tabla DynamoDB — ContractExtractions (Contrato 1)
  # -------------------------------------------------------------------------

  ContractExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ContractExtractions
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl
      Tags:
        - Key: project
          Value: hackaton

  # -------------------------------------------------------------------------
  # Función Lambda — Ingestion handler
  # -------------------------------------------------------------------------

  IngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      Runtime: python3.12
      CodeUri: ../backend/ingestion/
      Timeout: 30
      MemorySize: 512
      Tags:
        project: hackaton
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ContractExtractionsTable
          S3_BUCKET_NAME: !Ref ContractsBucket
          ENVIRONMENT: !Ref EnvironmentName
          LOG_LEVEL: INFO
      Policies:
        - S3WritePolicy:
            BucketName: !Ref ContractsBucket
        - S3ReadPolicy:
            BucketName: !Ref ContractsBucket
        - DynamoDBWritePolicy:
            TableName: !Ref ContractExtractionsTable
        - Statement:
            - Effect: Allow
              Action:
                - textract:DetectDocumentText
              Resource: "*"
      Events:
        IngestApi:
          Type: Api
          Properties:
            Path: /ingest
            Method: POST
            RestApiId: !Ref ClaroYSimpleApi

  # -------------------------------------------------------------------------
  # Tabla DynamoDB — ContractAnalyses (Contrato 2)
  # -------------------------------------------------------------------------

  ContractAnalysesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ContractAnalyses
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl
      Tags:
        - Key: project
          Value: hackaton

  # -------------------------------------------------------------------------
  # Función Lambda — Analysis handler (Módulo 2)
  # -------------------------------------------------------------------------

  AnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      Runtime: python3.12
      CodeUri: ../backend/analysis/
      Timeout: 60
      MemorySize: 256
      Tags:
        project: hackaton
      Environment:
        Variables:
          EXTRACTIONS_TABLE_NAME: !Ref ContractExtractionsTable
          ANALYSES_TABLE_NAME: !Ref ContractAnalysesTable
          BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
          MAX_CONTEXT_CHARS: "150000"
          BEDROCK_TIMEOUT_SECONDS: "45"
          ENVIRONMENT: !Ref EnvironmentName
          LOG_LEVEL: INFO
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ContractExtractionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ContractAnalysesTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        AnalyzeApi:
          Type: Api
          Properties:
            Path: /analyze
            Method: POST
            RestApiId: !Ref ClaroYSimpleApi

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------

Outputs:
  IngestionApiUrl:
    Description: URL base del endpoint de ingesta
    Value: !Sub "https://${ClaroYSimpleApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/ingest"

  IngestionFunctionArn:
    Description: ARN de la función Lambda de ingesta
    Value: !GetAtt IngestionFunction.Arn

  AnalysisApiUrl:
    Description: URL base del endpoint de análisis
    Value: !Sub "https://${ClaroYSimpleApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/analyze"

  AnalysisFunctionArn:
    Description: ARN de la función Lambda de análisis
    Value: !GetAtt AnalysisFunction.Arn

  ContractAnalysesTableName:
    Description: Nombre de la tabla DynamoDB de análisis
    Value: !Ref ContractAnalysesTable
